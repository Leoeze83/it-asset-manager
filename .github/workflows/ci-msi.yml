name: CI and MSI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test

      - name: Build web
        run: npm run build

      - name: Upload web dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          if-no-files-found: error

  build_msi:
    name: Build MSI Agent
    runs-on: windows-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install dependencies
        run: npm ci

      - name: Install WiX tool
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.*
          "$env:USERPROFILE/.dotnet/tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build MSI
        run: npm run build:msi

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-msi
          path: dist/msi/AssetFlow-Agent-Installer.msi
          if-no-files-found: error

  release_assets:
    name: Attach Release Assets
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs:
      - build_msi

    permissions:
      contents: write

    steps:
      - name: Download MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: agent-msi
          path: release-assets

      - name: Publish MSI to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/AssetFlow-Agent-Installer.msi
